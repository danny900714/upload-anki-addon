syntax = "proto3";

package net.ankiweb;

enum LoginResponseStatus {
  LOGIN_RESPONSE_STATUS_UNKNOWN = 0;
  LOGIN_RESPONSE_STATUS_AUTHENTICATED = 1;
  LOGIN_RESPONSE_STATUS_INVALID_USER = 2;
  LOGIN_RESPONSE_STATUS_INVALID_PASS = 3;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  LoginResponseStatus status = 1;
  string token = 2;
}

message AddonBranch {
  optional uint32 min_version = 1;
  optional int32 max_version = 2;
}

message AddonInfo {
  optional uint32 addon_id = 1;
  optional string title = 2;
  optional string tags = 3;
  optional string support_url = 4;
  optional string description = 5;
  repeated AddonBranch branches = 6;
}

message AddonFile {
  optional bytes zip_data = 1;
  optional uint32 branch_index = 2;
}

message UploadAddonRequest {
  optional AddonInfo info = 1;
  optional AddonFile file = 2;
}

message UploadAddonResponse {
  optional uint32 addon_id = 1;
}
