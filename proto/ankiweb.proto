syntax = "proto3";

package net.ankiweb;

message AddonBranch {
  uint32 min_version = 1;
  int32 max_version = 2;
}

message AddonInfo {
  optional uint32 addon_id = 1;
  string title = 2;
  string tags = 3;
  string support_url = 4;
  string description = 5;
  repeated AddonBranch branches = 6;
}

message AddonFile {
  bytes zip_data = 1;
  uint32 branch_index = 2;
}

message UploadAddonRequest {
  AddonInfo info = 1;
  optional AddonFile file = 2;
}

message UploadAddonResponse {
  uint32 addon_id = 1;
}
