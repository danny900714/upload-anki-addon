syntax = "proto3";

package net.ankiweb;

enum LoginResponseStatus {
  LOGIN_RESPONSE_STATUS_UNKNOWN = 0;
  LOGIN_RESPONSE_STATUS_AUTHENTICATED = 1;
  LOGIN_RESPONSE_STATUS_INVALID_USER = 2;
  LOGIN_RESPONSE_STATUS_INVALID_PASS = 3;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  LoginResponseStatus status = 1;
  string token = 2;
}

message AddonBranch {
  uint32 min_version = 1;
  int32 max_version = 2;
}

message AddonInfo {
  optional uint32 addon_id = 1;
  string title = 2;
  string tags = 3;
  string support_url = 4;
  string description = 5;
  repeated AddonBranch branches = 6;
}

message AddonFile {
  bytes zip_data = 1;
  uint32 branch_index = 2;
}

message UploadAddonRequest {
  AddonInfo info = 1;
  optional AddonFile file = 2;
}

message UploadAddonResponse {
  uint32 addon_id = 1;
}
